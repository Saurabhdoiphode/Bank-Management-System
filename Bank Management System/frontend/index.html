<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Management System - Modern Banking</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="home-container">
        <!-- Animated Background -->
        <div class="animated-bg">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
        </div>

        <!-- Main Content -->
        <div class="content-wrapper">
            <!-- LEFT SIDE - CUSTOMER LOGIN -->
            <div class="login-section customer-section">
                <div class="section-content">
                    <div class="logo-area">
                        <div class="logo-icon">
                            <i class="fas fa-university"></i>
                        </div>
                        <h1>SecureBank</h1>
                    </div>

                    <!-- Tab Navigation -->
                    <div class="tab-navigation">
                        <button class="tab-btn active" data-tab="login">Login</button>
                        <button class="tab-btn" data-tab="register">Register</button>
                    </div>

                    <!-- Login Form -->
                    <div class="tab-content active" id="login-tab">
                        <form id="customerLoginForm" class="auth-form">
                            <div class="form-group">
                                <label for="email">Email Address</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-envelope"></i>
                                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="password">Password</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-lock"></i>
                                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                                </div>
                            </div>

                            <div class="form-options">
                                <label class="remember-me">
                                    <input type="checkbox" name="remember">
                                    <span>Remember me</span>
                                </label>
                                <a href="#" class="forgot-password">Forgot Password?</a>
                            </div>

                            <button type="submit" class="login-btn">
                                <span>Login to Account</span>
                                <i class="fas fa-arrow-right"></i>
                            </button>
                        </form>
                    </div>

                    <!-- Register Form -->
                    <div class="tab-content" id="register-tab">
                        <form id="customerRegisterForm" class="auth-form">
                            <div class="form-group">
                                <label for="fullName">Full Name</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-user"></i>
                                    <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="regEmail">Email Address</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-envelope"></i>
                                    <input type="email" id="regEmail" name="email" placeholder="Enter your email" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="mobile">Mobile Number</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-phone"></i>
                                    <input type="tel" id="mobile" name="mobileNumber" placeholder="10-digit mobile number" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="address">Address</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-map-marker-alt"></i>
                                    <input type="text" id="address" name="address" placeholder="Enter your address" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="aadhaar">Aadhaar Number</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-id-card"></i>
                                    <input type="text" id="aadhaar" name="aadhaarNumber" placeholder="12-digit Aadhaar number" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="pan">PAN Number</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-file"></i>
                                    <input type="text" id="pan" name="panNumber" placeholder="PAN number" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="accountType">Account Type</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-list"></i>
                                    <select id="accountType" name="accountType" required>
                                        <option value="">Select Account Type</option>
                                        <option value="SAVINGS">Savings Account</option>
                                        <option value="CURRENT">Current Account</option>
                                        <option value="STUDENT">Student Account</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="regPassword">Password</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-lock"></i>
                                    <input type="password" id="regPassword" name="password" placeholder="Create a password" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="confirmPassword">Confirm Password</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-lock"></i>
                                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
                                </div>
                            </div>

                            <button type="submit" class="login-btn">
                                <span>Create Account</span>
                                <i class="fas fa-check"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- RIGHT SIDE - ADMIN LOGIN -->
            <div class="login-section admin-section">
                <div class="section-content">
                    <div class="admin-logo">
                        <div class="admin-icon">
                            <i class="fas fa-shield-alt"></i>
                        </div>
                        <h2>Admin Portal</h2>
                    </div>

                    <div class="admin-badge">
                        <i class="fas fa-crown"></i>
                        <span>Administrator Access</span>
                    </div>

                    <form id="adminLoginForm" class="auth-form admin-form">
                        <div class="admin-notice">
                            <i class="fas fa-info-circle"></i>
                            <p>Admin credentials are required to access the administrative panel</p>
                        </div>

                        <div class="form-group">
                            <label for="adminEmail">Admin Email</label>
                            <div class="input-wrapper">
                                <i class="fas fa-envelope"></i>
                                <input type="email" id="adminEmail" name="email" placeholder="admin@gmail.com" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="adminPassword">Admin Password</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="adminPassword" name="password" placeholder="Enter admin password" required>
                            </div>
                        </div>

                        <div class="security-info">
                            <i class="fas fa-shield-alt"></i>
                            <span>Your session is encrypted and secure</span>
                        </div>

                        <button type="submit" class="login-btn admin-login-btn">
                            <span>Access Admin Panel</span>
                            <i class="fas fa-sign-in-alt"></i>
                        </button>
                    </form>

                    <div class="admin-features">
                        <h3>Admin Features</h3>
                        <ul>
                            <li><i class="fas fa-users"></i> Manage Customers</li>
                            <li><i class="fas fa-exchange-alt"></i> View Transactions</li>
                            <li><i class="fas fa-chart-line"></i> Banking Analytics</li>
                            <li><i class="fas fa-check-circle"></i> Account Approval</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="loading-spinner">
        <div class="spinner"></div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
