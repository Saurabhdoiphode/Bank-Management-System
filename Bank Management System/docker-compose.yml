# ==================== DOCKER COMPOSE ====================
# This file allows you to run MongoDB and Backend together with Docker
# Usage: docker-compose up

version: '3.8'

services:
  # MongoDB Service
  mongodb:
    image: mongo:7.0-alpine
    container_name: bank-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: bank_management_db
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - bank-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bank-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://admin:admin123@mongodb:27017/bank_management_db?authSource=admin
      SPRING_DATA_MONGODB_DATABASE: bank_management_db
      JWT_SECRET: your-secret-key-here-make-it-long-and-secure-for-production
      JWT_EXPIRATION: 86400000
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - bank-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/auth/customer/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Nginx reverse proxy for frontend
  nginx:
    image: nginx:alpine
    container_name: bank-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - bank-network

networks:
  bank-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

# ==================== QUICK COMMANDS ====================
# Start all services:
#   docker-compose up -d
#
# Stop all services:
#   docker-compose down
#
# View logs:
#   docker-compose logs -f backend
#   docker-compose logs -f mongodb
#
# Rebuild and start:
#   docker-compose up -d --build
#
# Clean up volumes (WARNING: Deletes data):
#   docker-compose down -v
